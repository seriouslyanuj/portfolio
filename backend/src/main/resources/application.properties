# Server
server.port=8080

# CORS - allowed origins (comma separated)
portfolio.cors.allowed-origins=http://localhost:3000

# Contact Form
portfolio.contact.recipient-email=your-email@example.com

# Mail Configuration (set portfolio.mail.enabled=true to enable email sending)
portfolio.mail.enabled=false

# Uncomment and configure when mail is enabled:
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your-gmail@gmail.com
# spring.mail.password=your-app-password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# Logging
logging.level.com.portfolio=INFO

# Actuator
management.endpoints.web.exposure.include=health,info
